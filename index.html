<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Tavla - 3D</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Socket.IO (online mod için) -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <!-- Özel CSS -->
    <link rel="stylesheet" href="css/ui.css">
</head>
<body class="m-0 p-0 overflow-hidden bg-[#2C1810]">

    <!-- 3D Canvas Container -->
    <div id="canvas-container" class="w-full h-screen"></div>

    <!-- Üst Bar (Agent 3) -->
    <div id="top-bar"></div>

    <!-- Zar Paneli (Agent 3) -->
    <div id="dice-panel"></div>

    <!-- Detay Paneli (Agent 3) -->
    <div id="detail-panel"></div>

    <!-- Bildirimler (Agent 3) -->
    <div id="notifications"></div>

    <!-- Lobby (Agent 3) -->
    <div id="lobby-screen"></div>

    <!-- JS Dosyaları -->
    <script src="js/scene.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/lights.js"></script>
    <script src="js/objectLoader.js"></script>
    <script src="js/interaction/cameraControls.js"></script>
    <script src="js/interaction/raycaster.js"></script>
    <script src="js/interaction/selection.js"></script>
    <script src="js/interaction/animations.js"></script>
    <script src="js/game/diceEngine.js"></script>
    <script src="js/game/moveValidator.js"></script>
    <script src="js/game/turnManager.js"></script>
    <script src="js/game/gameLogic.js"></script>
    <script src="js/ui/topBar.js"></script>
    <script src="js/ui/dicePanel.js"></script>
    <script src="js/ui/detailPanel.js"></script>
    <script src="js/ui/notifications.js"></script>
    <script src="js/ui/lobby.js"></script>
    <!-- Ana giriş noktası - EN SON yüklenir -->
    <script src="js/main.js"></script>
</body>
</html>
